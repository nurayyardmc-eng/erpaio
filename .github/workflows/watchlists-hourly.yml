name: Hourly Watchlists

on:
  schedule:
    # Watchlist eşik kontrolü saatlik — endpoint her enabled watchlist'i değerlendirip
    # threshold operator + threshold value kombinasyonuna göre tetikler.
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Call watchlists endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret is not set in repo settings"
            exit 1
          fi
          curl -fsS -X GET \
            --max-time 310 \
            -H "Authorization: Bearer $CRON_SECRET" \
            https://erpaio.vercel.app/api/cron/watchlists
