name: Daily Cleanup

on:
  schedule:
    # 04:00 UTC daily — low-traffic window. Retention windows are days, not
    # minutes; günlük tek run yeterli.
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Call cleanup endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret is not set in repo settings"
            exit 1
          fi
          curl -fsS -X GET \
            --max-time 90 \
            -H "Authorization: Bearer $CRON_SECRET" \
            https://erpaio.vercel.app/api/cron/cleanup
