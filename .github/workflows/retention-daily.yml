name: Daily Retention Hook

on:
  schedule:
    # Her gün 10:07 UTC (Türkiye saatiyle 13:07). Off-peak dakika seçildi.
    - cron: '7 10 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Call retention endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret is not set in repo settings"
            exit 1
          fi
          curl -fsS -X GET \
            --max-time 120 \
            -H "Authorization: Bearer $CRON_SECRET" \
            https://erpaio.vercel.app/api/cron/retention
