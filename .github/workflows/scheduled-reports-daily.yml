name: Daily Scheduled Reports

on:
  schedule:
    # Saatlik tetik — endpoint kendi içinde report'ları schedule field'ına göre filtreliyor
    # (hourly / daily_06 / daily_18 / weekly_monday / monthly_first).
    # Yani GitHub Actions saatlik çağırıyor, kod doğru raporu seçiyor.
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Call scheduled-reports endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret is not set in repo settings"
            exit 1
          fi
          curl -fsS -X GET \
            --max-time 310 \
            -H "Authorization: Bearer $CRON_SECRET" \
            https://erpaio.vercel.app/api/cron/scheduled-reports
